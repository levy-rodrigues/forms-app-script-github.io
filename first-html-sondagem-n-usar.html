<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { --bg:#f6f7fb; --card:#fff; --text:#111; --muted:#667085; --border:#e5e7eb; }
      body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
      .wrap { padding:24px; }
      .card {
        max-width: 760px; margin: 0 auto; background:var(--card);
        border:1px solid var(--border); border-radius:16px; padding:20px;
        box-shadow: 0 10px 28px rgba(0,0,0,.06);
      }
      h1 { font-size:20px; margin:0 0 6px; }
      p  { margin:0 0 18px; color:var(--muted); font-size:14px; }
      label { display:block; font-weight:700; margin-top:14px; font-size:14px; }
      input[type="text"], input[type="email"], textarea {
        width:100%; margin-top:8px; padding:10px 12px;
        border:1px solid var(--border); border-radius:12px;
        font-size:14px;
      }
      textarea { min-height: 110px; resize: vertical; }
      .box {
        margin-top:10px; border:1px solid var(--border);
        border-radius:12px; padding:12px; background:#fafafa;
      }
      .opt { display:flex; gap:10px; align-items:flex-start; padding:6px 0; }
      button {
        margin-top:18px;
        border:0; border-radius:12px;
        padding:12px; font-weight:700;
        cursor:pointer; background:#2d6cdf; color:#fff; width:100%;
      }
      .msg { margin-top:12px; font-size:14px; }
      .err { color:#b42318; }
      .ok  { color:#067647; }
      .hidden { display:none; }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h1>Pesquisa de Feedback</h1>
        <p>Campos obrigatórios precisam ser preenchidos.</p>

        <label>Nome do canal *</label>
        <input id="canal" type="text" placeholder="Ex: Canal XPTO" />

        <label>E-mail do respondente</label>
        <input id="email" type="email" placeholder="Opcional" />

        <label>Itens mais importantes *</label>
        <div class="box" id="itensBox">
          <div class="opt"><input type="checkbox" value="Atendimento / Suporte"> Atendimento / Suporte</div>
          <div class="opt"><input type="checkbox" value="Tempo de resposta / resolução"> Tempo de resposta / resolução</div>
          <div class="opt"><input type="checkbox" value="Tempo de desenvolvimento do produto"> Tempo de desenvolvimento do produto</div>
          <div class="opt"><input type="checkbox" value="Qualidade do produto"> Qualidade do produto</div>
          <div class="opt"><input type="checkbox" value="Facilidade no uso do produto"> Facilidade no uso do produto</div>
          <div class="opt"><input type="checkbox" value="Comunicação com os times"> Comunicação com os times</div>
          <div class="opt">
            <input id="outrosCheck" type="checkbox" value="Outros"> Outros
          </div>

          <div id="outrosArea" class="hidden">
            <label>Mencione os itens que considere importante *</label>
            <input id="outrosTexto" type="text" placeholder="Descreva aqui..." />
          </div>
        </div>

        <label>Deixe seu comentário</label>
        <textarea id="comentario" placeholder="Opcional"></textarea>

        <button onclick="enviar()">Enviar</button>
        <div id="msg" class="msg"></div>
      </div>
    </div>

    <script>
      const outrosCheck = document.getElementById("outrosCheck");
      const outrosArea = document.getElementById("outrosArea");

      outrosCheck.addEventListener("change", () => {
        outrosArea.classList.toggle("hidden", !outrosCheck.checked);
      });

      function getItens() {
        const checks = document.querySelectorAll('#itensBox input[type="checkbox"]');
        const itens = [];
        checks.forEach(c => { if (c.checked) itens.push(c.value); });
        return itens;
      }

      function enviar() {
        const canal = document.getElementById("canal").value.trim();
        const email = document.getElementById("email").value.trim();
        const itens = getItens();
        const outrosTexto = document.getElementById("outrosTexto").value.trim();
        const comentario = document.getElementById("comentario").value.trim();

        const msg = document.getElementById("msg");
        msg.textContent = "";

        if (!canal) {
          msg.textContent = "Preencha o nome do canal.";
          msg.className = "msg err";
          return;
        }

        if (itens.length === 0) {
          msg.textContent = "Selecione pelo menos 1 item.";
          msg.className = "msg err";
          return;
        }

        if (itens.includes("Outros") && !outrosTexto) {
          msg.textContent = "Descreva o campo 'Outros'.";
          msg.className = "msg err";
          return;
        }

        msg.textContent = "Enviando...";
        msg.className = "msg";

        google.script.run
          .withSuccessHandler(() => {
            msg.textContent = "Enviado com sucesso!";
            msg.className = "msg ok";
            document.querySelectorAll("input, textarea").forEach(el => el.value = "");
            document.querySelectorAll("input[type='checkbox']").forEach(el => el.checked = false);
            outrosArea.classList.add("hidden");
          })
          .withFailureHandler(err => {
            msg.textContent = "Erro: " + err.message;
            msg.className = "msg err";
          })
          .salvarResposta({ canal, email, itens, outrosTexto, comentario });
      }
    </script>
  </body>
</html>
