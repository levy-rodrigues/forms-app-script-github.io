<script>
/* =========================================================
   LOGO
   Cole aqui depois, por exemplo:
   const LOGO_DATA_URL = "data:image/png;base64,SEU_BASE64_AQUI";
   ========================================================= */
const LOGO_DATA_URL = "";

document.addEventListener("DOMContentLoaded", () => {
  const img = document.getElementById("logoEmpresa");
  if (img && LOGO_DATA_URL && LOGO_DATA_URL.startsWith("data:image/")) {
    img.src = LOGO_DATA_URL;
  } else {
    if (img) img.style.display = "none";
  }
});

// =========================
// HELPERS
// =========================
function textoLimpo(s){ return String(s || "").replace(/\s+/g, " ").trim(); }

function getCategoriaCodigo(){
  return document.querySelector(".optcard.selected")?.dataset?.codigo || "";
}
function getCategoriaNome(){
  const el = document.querySelector(".optcard.selected");
  return el ? textoLimpo(el.textContent) : "";
}
function getTipoCodigo(){
  return document.querySelector('input[name="tipo"]:checked')?.value || "";
}
function getTipoNome(){
  const el = document.querySelector('input[name="tipo"]:checked');
  return el ? textoLimpo(el.parentElement?.textContent || "") : "";
}
function getSubtipoNome(){
  const el = document.querySelector('input[name="subtipo"]:checked');
  return el ? textoLimpo(el.parentElement?.textContent || "") : "";
}

function getDescricao(tipoCodigo){
  if(tipoCodigo === "Faltas"){
    const d1 = textoLimpo(document.getElementById("faltasDias")?.value || "");
    const d2 = textoLimpo(document.getElementById("faltasTelegrama")?.value || "");
    return [
      d1 ? `Dias consecutivos: ${d1}` : "",
      d2 ? `Telegrama/tentativas: ${d2}` : ""
    ].filter(Boolean).join("\n");
  }

  if(tipoCodigo === "ContratoTrabalho"){
    const regime = document.querySelector('input[name="regimeContrato"]:checked')?.value || "";
    const matricula = textoLimpo(document.getElementById("matriculaContrato")?.value || "");
    const nomeColaborador = textoLimpo(document.getElementById("nomeColaboradorContrato")?.value || "");
    const cliente = textoLimpo(document.getElementById("clienteContrato")?.value || "");
    const descricao = textoLimpo(document.getElementById("descricaoContrato")?.value || "");

    return [
      regime ? `Regime: ${regime}` : "",
      matricula ? `Matrícula: ${matricula}` : "",
      nomeColaborador ? `Nome Colaborador: ${nomeColaborador}` : "",
      cliente ? `Cliente: ${cliente}` : "",
      descricao ? `Descrição: ${descricao}` : ""
    ].filter(Boolean).join("\n");
  }

  const tSub = document.querySelector("#subcampos textarea");
  if(tSub && textoLimpo(tSub.value)) return textoLimpo(tSub.value);

  const tPadrao = document.getElementById("descricao");
  if(tPadrao && textoLimpo(tPadrao.value)) return textoLimpo(tPadrao.value);

  return "";
}

function setCamposFinaisVisivel(visible){
  const box = document.getElementById("camposFinais");
  const txt = document.getElementById("descricao");
  if(!box || !txt) return;

  box.style.display = visible ? "block" : "none";
  txt.required = !!visible;
  if(!visible) txt.setCustomValidity("");
}

function validarFormularioBasico(categoriaCodigo, tipoCodigo){
  const email = document.getElementById("email");
  const solicitante = document.getElementById("solicitante");
  const departamento = document.getElementById("departamento");
  const gestor = document.getElementById("gestor");

  if(!textoLimpo(email.value) || !textoLimpo(solicitante.value) || !textoLimpo(departamento.value) || !textoLimpo(gestor.value)){
    throw new Error("Preencha todos os campos obrigatórios do topo.");
  }
  if(!categoriaCodigo){
    throw new Error("Selecione uma categoria (Consulta Trabalhista/Contratos/EHS).");
  }
  if(categoriaCodigo === "Consulta" && !tipoCodigo){
    throw new Error("Selecione o tipo de Dúvida/Ocorrência.");
  }

  if(categoriaCodigo !== "Consulta"){
    throw new Error("Esta categoria estará disponível em breve.");
  }

  if(tipoCodigo === "Assedio"){
    return;
  }

  if(tipoCodigo === "ContratoTrabalho"){
    const regime = document.querySelector('input[name="regimeContrato"]:checked');
    const matricula = textoLimpo(document.getElementById("matriculaContrato")?.value || "");
    const nomeColaborador = textoLimpo(document.getElementById("nomeColaboradorContrato")?.value || "");
    const cliente = textoLimpo(document.getElementById("clienteContrato")?.value || "");
    const descricao = textoLimpo(document.getElementById("descricaoContrato")?.value || "");

    if(!regime || !matricula || !nomeColaborador || !cliente || !descricao){
      throw new Error("Preencha todos os campos obrigatórios de Contrato de trabalho.");
    }
    return;
  }

  const desc = getDescricao(tipoCodigo);
  if(!desc) throw new Error("Preencha a descrição do seu caso antes de enviar.");
}

function mostrarNomeArquivos(input, spanId){
  const texto = document.getElementById(spanId);
  if(!texto) return;

  if(!input.files || input.files.length === 0){
    texto.innerText = "Nenhum arquivo selecionado";
  } else if(input.files.length === 1){
    texto.innerText = input.files[0].name;
  } else {
    texto.innerText = input.files.length + " arquivos selecionados";
  }
}

const MAX_FILE_MB = 8;
const MAX_TOTAL_MB = 18;

function bytesToMB(b){ return b / (1024 * 1024); }

function listarTodosArquivosSelecionados(){
  const inputs = Array.from(document.querySelectorAll('input[type="file"]'));
  const files = [];
  inputs.forEach(inp => {
    if(inp.files && inp.files.length){
      Array.from(inp.files).forEach(f => files.push(f));
    }
  });
  return files;
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Falha ao ler arquivo: " + file.name));
    reader.onload = () => {
      const result = String(reader.result || "");
      const base64 = result.includes(",") ? result.split(",")[1] : "";
      resolve({
        name: file.name,
        mimeType: file.type || "application/octet-stream",
        size: file.size,
        bytesBase64: base64
      });
    };
    reader.readAsDataURL(file);
  });
}

async function coletarAnexosBase64(){
  const files = listarTodosArquivosSelecionados();
  if(!files.length) return [];

  const totalBytes = files.reduce((acc, f) => acc + f.size, 0);
  if(bytesToMB(totalBytes) > MAX_TOTAL_MB){
    throw new Error(`Os anexos ultrapassam o limite total de ${MAX_TOTAL_MB}MB. Reduza os arquivos e tente novamente.`);
  }

  for(const f of files){
    if(bytesToMB(f.size) > MAX_FILE_MB){
      throw new Error(`O arquivo "${f.name}" ultrapassa ${MAX_FILE_MB}MB. Reduza e tente novamente.`);
    }
  }

  const anexos = [];
  for(const f of files){
    anexos.push(await fileToBase64(f));
  }
  return anexos;
}

document.querySelectorAll('.optcard').forEach(card=>{
  card.addEventListener('click', function(){
    document.querySelectorAll('.optcard').forEach(c=>c.classList.remove('selected'));
    this.classList.add('selected');

    const codigo = this.getAttribute('data-codigo') || "";
    const consultaCampos = document.getElementById('consultaCampos');
    const botaoEnviar = document.getElementById("botaoEnviar");
    const mensagemIndisponivel = document.getElementById("mensagemIndisponivel");

    document.querySelectorAll('input[name="tipo"]').forEach(r => {
      r.checked = false;
      r.parentElement.classList.remove("selected");
    });

    document.getElementById("subcampos").innerHTML = "";
    setCamposFinaisVisivel(false);
    mensagemIndisponivel.style.display = "none";
    mensagemIndisponivel.innerHTML = "";

    if(codigo === 'Consulta'){
      consultaCampos.style.display = 'block';
      botaoEnviar.style.display = 'none';
    } else if(codigo === 'Contratos' || codigo === 'EHS'){
      consultaCampos.style.display = 'none';
      botaoEnviar.style.display = 'none';
      mensagemIndisponivel.style.display = "block";
      mensagemIndisponivel.innerHTML = `
        <div class="alert">
          <strong>Este serviço estará disponível em breve para apoiar a rotina operacional, promovendo mais agilidade, organização e eficiência aos processos.</strong>
        </div>
      `;
    } else {
      consultaCampos.style.display = 'none';
      botaoEnviar.style.display = 'none';
    }
  });
});

document.querySelectorAll('input[name="tipo"]').forEach(radio=>{
  radio.addEventListener("change", function(){
    document.querySelectorAll("#radioTipo .radio-item").forEach(el=>el.classList.remove("selected"));
    this.parentElement.classList.add("selected");

    const tipoCodigo = this.value;

    mostrarSubcampos(tipoCodigo);

    const botaoEnviar = document.getElementById("botaoEnviar");

    if(tipoCodigo === "Assedio"){
      setCamposFinaisVisivel(false);
      botaoEnviar.style.display = "none";
    } else if(["Roubo","Atestado","Escala","Faltas","ContratoTrabalho"].includes(tipoCodigo)){
      setCamposFinaisVisivel(false);
      botaoEnviar.style.display = "block";
    } else {
      setCamposFinaisVisivel(true);
      botaoEnviar.style.display = "block";
    }
  });
});

document.getElementById("form").addEventListener("submit", async function(event){
  event.preventDefault();

  const btn = document.getElementById("btnSubmit");
  const status = document.getElementById("statusEnvio");

  try{
    btn.disabled = true;
    status.style.display = "block";
    status.innerText = "Enviando...";

    const categoriaCodigo = getCategoriaCodigo();
    const tipoCodigo = getTipoCodigo();

    validarFormularioBasico(categoriaCodigo, tipoCodigo);

    const dados = {
      email: textoLimpo(document.getElementById("email").value),
      solicitante: textoLimpo(document.getElementById("solicitante").value),
      departamento: textoLimpo(document.getElementById("departamento").value),
      gestor: textoLimpo(document.getElementById("gestor").value),
      categoria: getCategoriaNome(),
      tipoNome: getTipoNome(),
      subtipoNome: getSubtipoNome(),
      descricao: getDescricao(tipoCodigo),
      extra1: tipoCodigo,
      extra2: "",
      extra3: ""
    };

    const anexos = await coletarAnexosBase64();
    status.innerText = "Salvando...";

    google.script.run
      .withSuccessHandler(() => {
        document.querySelector(".container form").style.display = "none";
        document.querySelector(".description-text").style.display = "none";
        document.getElementById("pagina-sucesso").style.display = "block";
      })
      .withFailureHandler((err) => {
        btn.disabled = false;
        status.style.display = "none";
        alert("Erro ao enviar: " + (err?.message || err));
      })
      .enviarFormulario({ dados, anexos });

  }catch(e){
    btn.disabled = false;
    status.style.display = "none";
    alert(e.message || String(e));
  }
});
</script>
